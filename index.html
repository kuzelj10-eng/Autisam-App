<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Notanker</title>
    <style>
        /* Das Design für die Buttons: Groß und freundlich */
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            background-color: #f0f4f8; /* Ein beruhigendes Hellblau/Grau */
            font-family: sans-serif;
        }

        .anker-button {
            flex: 1; /* Nimmt den ganzen Platz ein */
            margin: 10px;
            font-size: 3rem; /* Sehr große Schrift */
            border-radius: 30px; /* Abgerundete Ecken wirken weicher */
            border: none;
            background-color: #ffffff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <button class="anker-button">PAUSE</button>
    <button class="anker-button">STOPP</button>
    <button class="anker-button">HILFE</button>

</body>
</html>
